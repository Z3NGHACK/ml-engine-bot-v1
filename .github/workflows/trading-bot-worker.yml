# ============================================
# FILE: .github/workflows/trading-bot-worker.yml
# ============================================
# This file handles automated trading bot execution
# Schedule: Every 5 minutes
# Creates data collection and analysis pipeline

name: Trading Bot Worker

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Data Collection
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: python data_collector/main.py
      
      - name: Run Analysis
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python scripts/analyze_and_notify.py
# Triggers
on:
  # Scheduled execution
  schedule:
    # Every 5 minutes during business hours (0800-2000 UTC)
    - cron: '*/5 8-20 * * *'
    # Every 30 minutes outside business hours
    - cron: '*/30 0-8,20-23 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  
  # Also trigger on push to main (optional, remove if not needed)
  push:
    branches:
      - main
    paths:
      - 'worker.py'
      - 'analysis/**'
      - 'requirements.txt'
